# This is a Databricks asset bundle definition for unstructured_ie_selected_pages_workflow.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: unstructured_ie_selected_pages_workflow

variables:
  catalog:
    description: The catalog name for the workflow
    default: fins_genai
  schema:
    description: The schema name for the workflow
    default: unstructured_documents
  clean_pipeline_tables:
    description: Clean pipeline tables and checkpoints
    default: Yes
  source_volume_path:
    description: Source volume path for PDF files
    default: /Volumes/fins_genai/unstructured_documents/ie_selected_pages_workflow/inputs/
  output_volume_path:
    description: Output volume path for processed images
    default: /Volumes/fins_genai/unstructured_documents/ie_selected_pages_workflow/outputs/
  checkpoint_base_path:
    description: Base path for Structured Streaming checkpoints
    default: /Volumes/fins_genai/unstructured_documents/checkpoints/ie_selected_pages_workflow/
  raw_table_name:
    description: Table name for raw parsed documents
    default: ie_parsed_documents_raw
  page_content_table_name:
    description: Table name for page-level content
    default: ie_page_content
  classified_pages_table_name:
    description: Table name for classified pages
    default: ie_classified_pages
  extracted_info_table_name:
    description: Table name for extracted information
    default: ie_extracted_info
  volume_name:
    description: Unity Catalog volume name for the workflow
    default: ie_selected_pages_workflow

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
    permissions:
      - group_name: users
        level: CAN_VIEW
